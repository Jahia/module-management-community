upload_modules:
  description: Can upload modules in the module management
  metadata:
    visible: true
  auto_apply:
    - origin: hosted
  constraints:
    - user_permission: provisioningAccess
      path: /
  grants:
    - api: module-management-community.upload
    - api: module-management-community.import
    - api: module-management-community.export

provisioning_modules_graphql:
  description: Can use provisioning modules GraphQL API via Modules Management Community
  metadata:
    visible: true
  auto_apply:
    - origin: hosted
  constraints:
    - user_permission: provisioningAccess
      path: /
  grants:
    - api: graphql.Query.admin
    - api: graphql.Mutation.admin
    - api: graphql.AdminMutation.modulesManagement
    - api: graphql.AdminQuery.modulesManagement
    - api: graphql.ClusteredModuleManagementMutationResult
    - api: graphql.ModuleManagementMutationResult
    - api: graphql.ModuleManagementQueryResult
    # The per-bundle sub-API return types must be granted explicitly, otherwise the enforcing
    # security filter denies bundle(name:) / bundle(bundleId:) even for authorized users.
    - api: graphql.GqlBundle
    - api: graphql.ClusteredGqlBundle
    - api: graphql.GqlBundleMutation
    - api: graphql.UpdateModulesResult
